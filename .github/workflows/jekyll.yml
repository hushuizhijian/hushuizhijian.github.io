# 此工作流使用了未经 GitHub 认证的操作。
# 这些操作由第三方提供，并受
# 独立的服务条款、隐私政策和支持政策约束
# 文档。

# 用于将 Jekyll 站点构建并部署到 GitHub Pages 的示例工作流
name: 将 Jekyll 站点部署到 Pages

on:
  # 在推送到默认分支时运行
  push:
    branches: ["master"]
  # 允许您从“操作”选项卡手动运行此工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 仅允许一次并发部署，跳过处于进行中状态与最新排队之间的运行。
# 请勿取消正在进行的运行，因为我们希望这些生产部署能够顺利完成。
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建作业
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # 部署作业
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

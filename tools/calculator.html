<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加减乘除练习器 - 数学教学工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .settings {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .settings h3 {
            color: #555;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .setting-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .setting-row label {
            width: 120px;
            color: #666;
            font-weight: 500;
        }
        
        .setting-row select,
        .setting-row input {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .setting-row select:focus,
        .setting-row input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #333;
            margin-left: 10px;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
        }
        
        .question-area {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .question-text {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .answer-input {
            width: 200px;
            height: 60px;
            font-size: 32px;
            text-align: center;
            border: 4px solid white;
            border-radius: 12px;
            outline: none;
            transition: box-shadow 0.3s;
        }
        
        .answer-input:focus {
            box-shadow: 0 0 0 6px rgba(255,255,255,0.3);
        }
        
        .result-area {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        
        .result-correct {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .result-wrong {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .result-text {
            font-size: 20px;
            font-weight: 600;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px;
            transition: width 0.3s;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .question-text {
                font-size: 32px;
            }
            
            .answer-input {
                width: 150px;
                height: 50px;
                font-size: 24px;
            }
            
            .setting-row {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .setting-row label {
                margin-bottom: 5px;
            }
            
            .setting-row select,
            .setting-row input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 加减乘除练习器</h1>
        
        <div class="settings">
            <h3>⚙️ 练习设置</h3>
            <div class="setting-row">
                <label>运算类型：</label>
                <select id="operation">
                    <option value="+">加法</option>
                    <option value="-">减法</option>
                    <option value="×">乘法</option>
                    <option value="÷">除法</option>
                    <option value="mixed">混合运算</option>
                </select>
            </div>
            <div class="setting-row">
                <label>数字范围：</label>
                <select id="range">
                    <option value="10">1-10（一年级）</option>
                    <option value="20">1-20（二年级）</option>
                    <option value="50">1-50（三年级）</option>
                    <option value="100">1-100（四年级）</option>
                </select>
            </div>
            <div class="setting-row">
                <label>题目数量：</label>
                <input type="number" id="count" min="5" max="50" value="10">
            </div>
            <button class="btn btn-primary" onclick="startPractice()">开始练习</button>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="currentNum">0</div>
                <div class="stat-label">当前题数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="correctNum">0</div>
                <div class="stat-label">正确</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="wrongNum">0</div>
                <div class="stat-label">错误</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="accuracy">0%</div>
                <div class="stat-label">正确率</div>
            </div>
        </div>
        
        <div class="question-area" id="questionArea">
            <div class="question-text" id="questionText">点击"开始练习"开始做题</div>
            <input type="number" class="answer-input" id="answerInput" placeholder="输入答案" onkeyup="checkAnswer(event)" disabled>
            <div style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="checkAnswer()" id="submitBtn" disabled>提交答案</button>
            </div>
        </div>
        
        <div class="result-area" id="resultArea">
            <div class="result-text" id="resultText"></div>
        </div>
    </div>
    
    <script>
        let questions = [];
        let currentIndex = 0;
        let correctCount = 0;
        let wrongCount = 0;
        
        function startPractice() {
            const operation = document.getElementById('operation').value;
            const range = parseInt(document.getElementById('range').value);
            const count = parseInt(document.getElementById('count').value);
            
            questions = generateQuestions(operation, range, count);
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            
            document.getElementById('answerInput').disabled = false;
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('resultArea').style.display = 'none';
            
            showQuestion();
        }
        
        function generateQuestions(operation, range, count) {
            const ops = operation === 'mixed' ? ['+', '-', '×', '÷'] : [operation];
            const result = [];
            
            for (let i = 0; i < count; i++) {
                const op = ops[Math.floor(Math.random() * ops.length)];
                let num1, num2, answer;
                
                switch (op) {
                    case '+':
                        num1 = Math.floor(Math.random() * range) + 1;
                        num2 = Math.floor(Math.random() * range) + 1;
                        answer = num1 + num2;
                        break;
                    case '-':
                        num1 = Math.floor(Math.random() * range) + 1;
                        num2 = Math.floor(Math.random() * num1) + 1;
                        answer = num1 - num2;
                        break;
                    case '×':
                        num1 = Math.floor(Math.random() * Math.min(range, 12)) + 1;
                        num2 = Math.floor(Math.random() * Math.min(range, 12)) + 1;
                        answer = num1 * num2;
                        break;
                    case '÷':
                        num2 = Math.floor(Math.random() * Math.min(range, 12)) + 1;
                        answer = Math.floor(Math.random() * Math.min(range, 12)) + 1;
                        num1 = num2 * answer;
                        break;
                }
                
                result.push({ num1, num2, op, answer });
            }
            
            return result;
        }
        
        function showQuestion() {
            if (currentIndex >= questions.length) {
                showFinalResult();
                return;
            }
            
            const q = questions[currentIndex];
            document.getElementById('questionText').textContent = `${q.num1} ${q.op} ${q.num2} = ?`;
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').focus();
            document.getElementById('resultArea').style.display = 'none';
            
            updateStats();
        }
        
        function checkAnswer(event) {
            if (event && event.key !== 'Enter') return;
            
            const userAnswer = parseInt(document.getElementById('answerInput').value);
            const q = questions[currentIndex];
            
            if (isNaN(userAnswer)) {
                alert('请输入数字答案！');
                return;
            }
            
            const resultArea = document.getElementById('resultArea');
            const resultText = document.getElementById('resultText');
            
            if (userAnswer === q.answer) {
                resultArea.className = 'result-area result-correct';
                resultText.textContent = `🎉 回答正确！${q.num1} ${q.op} ${q.num2} = ${q.answer}`;
                correctCount++;
            } else {
                resultArea.className = 'result-area result-wrong';
                resultText.textContent = `😢 回答错误！正确答案是 ${q.answer}`;
                wrongCount++;
            }
            
            resultArea.style.display = 'block';
            currentIndex++;
            
            setTimeout(showQuestion, 1500);
        }
        
        function updateStats() {
            const total = correctCount + wrongCount;
            const accuracy = total > 0 ? Math.round((correctCount / total) * 100) : 0;
            
            document.getElementById('currentNum').textContent = `${currentIndex + 1}/${questions.length}`;
            document.getElementById('correctNum').textContent = correctCount;
            document.getElementById('wrongNum').textContent = wrongCount;
            document.getElementById('accuracy').textContent = `${accuracy}%`;
            
            const progress = ((currentIndex) / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }
        
        function showFinalResult() {
            const total = questions.length;
            const accuracy = Math.round((correctCount / total) * 100);
            
            let message = '';
            if (accuracy >= 90) {
                message = `🏆 太棒了！你答对了 ${correctCount} 题，正确率 ${accuracy}%！继续保持！`;
            } else if (accuracy >= 70) {
                message = `👍 不错！你答对了 ${correctCount} 题，正确率 ${accuracy}%，继续加油！`;
            } else {
                message = `💪 继续努力！你答对了 ${correctCount} 题，正确率 ${accuracy}%，多练习会更好！`;
            }
            
            document.getElementById('questionText').textContent = message;
            document.getElementById('answerInput').disabled = true;
            document.getElementById('submitBtn').disabled = true;
            
            const progress = (total / total) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            
            updateStats();
        }
    </script>
</body>
</html>

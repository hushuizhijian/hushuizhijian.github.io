# Site settings
title: 胡水之蒹Blog
SEOTitle: 胡水之蒹Blog | 小学数学教学分享
header-img: img/home-bg.jpg
email: 506867371@qq.com
description: "小学数学教学分享，记录教学心得和教学工具"
keyword: "胡水之蒹, 数学教学, 小学数学, 教学工具, 教学博客"
url: "https://yourdomain.com"
baseurl: ""

future: true

# SNS settings
RSS: false

# Build settings
highlighter: rouge
permalink: pretty
paginate: 10
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "README.md",
    "README.zh.md",
  ]
anchorjs: true

plugins: [jekyll-paginate]

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Sidebar settings
sidebar: true
sidebar-about-description: "你永远不知道明天和意外哪一个先来，过好当下每一天@Hus"
sidebar-avatar: "/img/Hus.png"

# Featured Tags
featured-tags: true
featured-condition-size: 1

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true

# MathJax
page-mathjax: true

# Friends
